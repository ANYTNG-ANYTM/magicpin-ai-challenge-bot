app = "magicpin-vera"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[[services]]
  internal_port = 8080
  processes = ["app"]
  
  [services.http_checks]
    enabled = true
    healthy = 200
    interval = 10000
    timeout = 5000
    uri = "/v1/healthz"

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
